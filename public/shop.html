<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop – Dotori School</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="assets/images/logo.png">
  <style>
    .shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.5rem; }
    .product-card { background:#fff; border:1px solid #e8e0d8; border-radius:14px; overflow:hidden; transition:box-shadow 0.2s; }
    .product-card:hover { box-shadow:0 6px 24px #0001; }
    .product-card img { width:100%; height:220px; object-fit:cover; background:#f5f0eb; }
    .product-card .no-img { width:100%; height:220px; background:#f5f0eb; display:flex; align-items:center; justify-content:center; color:#bbb; font-size:3rem; }
    .product-card .card-body { padding:1.2rem; }
    .fulfiller-badge { display:inline-block; font-size:0.72rem; font-weight:700; padding:0.2rem 0.55rem; border-radius:20px; margin-bottom:0.5rem; }
    .badge-printful { background:#e8f0fb; color:#2a5db0; }
    .badge-lulu     { background:#fff3e0; color:#b45c00; }
    .badge-manual   { background:#f0f0f0; color:#666; }

    /* Cart drawer */
    #cart-drawer { position:fixed; top:0; right:0; height:100%; width:360px; max-width:95vw; background:#fff; box-shadow:-4px 0 24px #0002; z-index:2000; transform:translateX(100%); transition:transform 0.3s; display:flex; flex-direction:column; }
    #cart-drawer.open { transform:translateX(0); }
    #cart-overlay { display:none; position:fixed; inset:0; background:#0004; z-index:1999; }
    #cart-overlay.open { display:block; }
    .cart-header { display:flex; align-items:center; justify-content:space-between; padding:1.2rem 1.5rem; border-bottom:1px solid #eee; }
    .cart-items { flex:1; overflow-y:auto; padding:1rem 1.5rem; }
    .cart-footer { padding:1.2rem 1.5rem; border-top:1px solid #eee; }
    .cart-item { display:flex; gap:0.8rem; margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid #f5f0eb; }
    .cart-item img { width:60px; height:60px; object-fit:cover; border-radius:8px; background:#f5f0eb; flex-shrink:0; }
    .cart-item .no-img-sm { width:60px; height:60px; border-radius:8px; background:#f5f0eb; display:flex; align-items:center; justify-content:center; color:#bbb; font-size:1.4rem; flex-shrink:0; }
    .qty-ctrl { display:flex; align-items:center; gap:0.4rem; margin-top:0.4rem; }
    .qty-ctrl button { width:24px; height:24px; border:1px solid #ddd; border-radius:4px; background:#f9f9f9; cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center; }
    #cart-icon-btn { position:relative; cursor:pointer; background:none; border:none; font-size:1.4rem; padding:0.3rem; }
    #cart-count { position:absolute; top:-4px; right:-4px; background:#e8a87c; color:#fff; font-size:0.65rem; font-weight:700; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>
  <header>
    <nav class="container">
      <div class="logo">
        <a href="/"><img src="assets/images/logo.png" alt="Dotori School" style="max-width:80px;" class="logo-img">
          <span class="logo-text" style="display:none;font-size:1.5rem;font-weight:700;color:#6b5b47;">Dotori School</span>
        </a>
      </div>
      <ul class="nav-links" style="display:flex;">
        <li><a href="/">Home</a></li>
        <li><a href="/programs">Programs</a></li>
        <li><a href="/shop" class="active">Shop</a></li>
        <!-- <li id="nav-account-link"><a href="/login">My Account</a></li> -->
      </ul>
      <button id="cart-icon-btn" onclick="openCart()" title="Cart" style="margin-left:0.5rem;">
        🛒<span id="cart-count" style="display:none;">0</span>
      </button>
    </nav>
  </header>

  <!-- Cart overlay -->
  <div id="cart-overlay" onclick="closeCart()"></div>

  <!-- Cart drawer -->
  <div id="cart-drawer">
    <div class="cart-header">
      <h3 style="margin:0;color:#6b5b47;font-size:1.05rem;">Your Cart</h3>
      <button onclick="closeCart()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:#aaa;">✕</button>
    </div>
    <div class="cart-items" id="cart-items-list"><p style="color:#aaa;text-align:center;margin-top:2rem;">Your cart is empty.</p></div>
    <div class="cart-footer">
      <div style="display:flex;justify-content:space-between;font-weight:700;color:#6b5b47;margin-bottom:1rem;">
        <span>Subtotal</span><span id="cart-subtotal">$0.00</span>
      </div>
      <p style="font-size:0.8rem;color:#aaa;margin:0 0 0.8rem;">Shipping and tax calculated at checkout.</p>
      <a id="checkout-btn" href="/checkout" style="display:block;text-align:center;background:#6b5b47;color:#fff;padding:0.8rem;border-radius:8px;font-weight:700;text-decoration:none;font-size:0.95rem;">
        Checkout →
      </a>
    </div>
  </div>

  <main>
    <div class="container" style="padding:2rem 1rem 4rem;">
      <div style="margin-bottom:2rem;">
        <h1 style="color:#6b5b47;font-size:1.8rem;margin:0 0 0.3rem;">Dotori School Shop</h1>
        <p style="color:#aaa;margin:0;">Textbooks and merchandise</p>
      </div>

      <!-- Filter tabs -->
      <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;">
        <button class="filter-btn active" onclick="filterProducts('all', this)" style="padding:0.45rem 1rem;border:1.5px solid #6b5b47;border-radius:20px;background:#6b5b47;color:#fff;cursor:pointer;font-size:0.9rem;font-weight:600;">All</button>
        <button class="filter-btn" onclick="filterProducts('lulu', this)" style="padding:0.45rem 1rem;border:1.5px solid #ddd;border-radius:20px;background:#fff;color:#6b5b47;cursor:pointer;font-size:0.9rem;font-weight:600;">Textbooks</button>
        <button class="filter-btn" onclick="filterProducts('printful', this)" style="padding:0.45rem 1rem;border:1.5px solid #ddd;border-radius:20px;background:#fff;color:#6b5b47;cursor:pointer;font-size:0.9rem;font-weight:600;">Merchandise</button>
      </div>

      <div id="products-grid" class="shop-grid">
        <p style="color:#aaa;">Loading products…</p>
      </div>
    </div>
  </main>

  <script>
    let allProducts = [];
    let cart = JSON.parse(sessionStorage.getItem('dotori_cart') || '[]');

    // Nav account link
    fetch('/api/auth/me').then(r => r.json()).then(d => {
      if (d.user) {
        const link = document.getElementById('nav-account-link');
        if (link) link.innerHTML = `<a href="/profile">My Account</a>`;
      }
    }).catch(() => {});

    async function loadProducts() {
      try {
        const res  = await fetch('/api/shop/products');
        const data = await res.json();
        allProducts = data.products || [];
        renderProducts(allProducts);
      } catch (err) {
        document.getElementById('products-grid').innerHTML = '<p style="color:#e00;">Failed to load products.</p>';
      }
    }

    function filterProducts(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.style.background = '#fff'; b.style.color = '#6b5b47'; b.style.borderColor = '#ddd';
        b.classList.remove('active');
      });
      btn.style.background = '#6b5b47'; btn.style.color = '#fff'; btn.style.borderColor = '#6b5b47';
      btn.classList.add('active');
      const filtered = type === 'all' ? allProducts : allProducts.filter(p => p.fulfiller === type);
      renderProducts(filtered);
    }

    function renderProducts(products) {
      const grid = document.getElementById('products-grid');
      if (!products.length) {
        grid.innerHTML = '<p style="color:#aaa;">No products available.</p>'; return;
      }
      const badgeClass = { printful: 'badge-printful', lulu: 'badge-lulu', manual: 'badge-manual' };
      const badgeLabel = { printful: 'Merchandise', lulu: 'Textbook', manual: 'Physical' };

      grid.innerHTML = products.map((p, pi) => {
        const minPrice = p.variants.length ? Math.min(...p.variants.map(v => v.price)) : 0;
        const maxPrice = p.variants.length ? Math.max(...p.variants.map(v => v.price)) : 0;
        const priceStr = minPrice === maxPrice ? `$${minPrice.toFixed(2)}` : `$${minPrice.toFixed(2)} – $${maxPrice.toFixed(2)}`;

        const variantOpts = p.variants.map((v, vi) =>
          `<option value="${vi}" ${v.stock === 0 ? 'disabled' : ''}>${v.label}${v.stock === 0 ? ' (Sold Out)' : ''} – $${v.price.toFixed(2)}</option>`
        ).join('');

        return `<div class="product-card" data-fulfiller="${p.fulfiller}">
          ${p.imageUrl
            ? `<img src="${p.imageUrl}" alt="${p.name}" loading="lazy">`
            : `<div class="no-img">📦</div>`}
          <div class="card-body">
            <span class="fulfiller-badge ${badgeClass[p.fulfiller] || 'badge-manual'}">${badgeLabel[p.fulfiller] || 'Item'}</span>
            <div style="font-weight:700;color:#6b5b47;font-size:1rem;margin-bottom:0.3rem;">${p.name}</div>
            ${p.description ? `<div style="color:#888;font-size:0.85rem;margin-bottom:0.8rem;line-height:1.4;">${p.description}</div>` : ''}
            <div style="font-weight:700;color:#6b5b47;font-size:1.05rem;margin-bottom:0.8rem;">${priceStr}</div>
            ${p.variants.length > 1
              ? `<select id="variant-${pi}" style="width:100%;padding:0.55rem 0.8rem;border:1.5px solid #ddd;border-radius:8px;font-size:0.9rem;margin-bottom:0.7rem;background:#fff;">${variantOpts}</select>`
              : `<input type="hidden" id="variant-${pi}" value="0">`}
            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem;">
              <label style="font-size:0.85rem;color:#888;">Qty:</label>
              <input type="number" id="qty-${pi}" value="1" min="1" max="10"
                style="width:60px;padding:0.45rem 0.6rem;border:1.5px solid #ddd;border-radius:8px;font-size:0.9rem;text-align:center;">
            </div>
            <button onclick="addToCart('${p._id}','${p.name.replace(/'/g,"\\'")}',${pi},'${p.fulfiller}')"
              style="width:100%;padding:0.65rem;background:#e8a87c;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.9rem;"
              onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
              Add to Cart
            </button>
          </div>
        </div>`;
      }).join('');
    }

    function addToCart(productId, productName, productIndex, fulfiller) {
      const product    = allProducts.find(p => p._id === productId);
      if (!product) return;
      const variantSel = document.getElementById(`variant-${productIndex}`);
      const variantIdx = parseInt(variantSel?.value ?? '0');
      const variant    = product.variants[variantIdx];
      if (!variant) return;
      const qty = Math.max(1, Math.min(10, parseInt(document.getElementById(`qty-${productIndex}`)?.value) || 1));

      // If same product+variant already in cart, increment qty
      const existing = cart.find(i => i.productId === productId && i.variantIndex === variantIdx);
      if (existing) {
        existing.qty = Math.min(10, existing.qty + qty);
      } else {
        cart.push({
          productId,
          productName,
          variantLabel:      variant.label,
          variantIndex:      variantIdx,
          price:             variant.price,
          qty,
          fulfiller,
          printfulVariantId: variant.printfulVariantId || null,
          luluProductId:     variant.luluProductId     || '',
          imageUrl:          product.imageUrl          || '',
        });
      }
      saveCart();
      renderCart();
      openCart();
    }

    function removeFromCart(idx) {
      cart.splice(idx, 1);
      saveCart();
      renderCart();
    }

    function updateQty(idx, delta) {
      cart[idx].qty = Math.max(1, Math.min(10, cart[idx].qty + delta));
      saveCart();
      renderCart();
    }

    function saveCart() {
      sessionStorage.setItem('dotori_cart', JSON.stringify(cart));
      updateCartIcon();
    }

    function updateCartIcon() {
      const total = cart.reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById('cart-count');
      badge.textContent = total;
      badge.style.display = total > 0 ? 'flex' : 'none';
    }

    function renderCart() {
      const el = document.getElementById('cart-items-list');
      if (!cart.length) {
        el.innerHTML = '<p style="color:#aaa;text-align:center;margin-top:2rem;">Your cart is empty.</p>';
        document.getElementById('cart-subtotal').textContent = '$0.00';
        return;
      }
      let subtotal = 0;
      el.innerHTML = cart.map((item, idx) => {
        subtotal += item.price * item.qty;
        return `<div class="cart-item">
          ${item.imageUrl
            ? `<img src="${item.imageUrl}" alt="${item.productName}">`
            : `<div class="no-img-sm">📦</div>`}
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;color:#6b5b47;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.productName}</div>
            ${item.variantLabel ? `<div style="color:#aaa;font-size:0.8rem;">${item.variantLabel}</div>` : ''}
            <div style="color:#6b5b47;font-size:0.88rem;font-weight:700;margin-top:0.2rem;">$${(item.price * item.qty).toFixed(2)}</div>
            <div class="qty-ctrl">
              <button onclick="updateQty(${idx},-1)">−</button>
              <span style="font-size:0.88rem;min-width:20px;text-align:center;">${item.qty}</span>
              <button onclick="updateQty(${idx},1)">+</button>
              <button onclick="removeFromCart(${idx})" style="margin-left:0.3rem;background:#fdeaea;color:#e00;border-color:#fcc;">✕</button>
            </div>
          </div>
        </div>`;
      }).join('');
      document.getElementById('cart-subtotal').textContent = `$${subtotal.toFixed(2)}`;
    }

    function openCart()  {
      document.getElementById('cart-drawer').classList.add('open');
      document.getElementById('cart-overlay').classList.add('open');
    }
    function closeCart() {
      document.getElementById('cart-drawer').classList.remove('open');
      document.getElementById('cart-overlay').classList.remove('open');
    }

    updateCartIcon();
    renderCart();
    loadProducts();
  </script>
</body>
</html>

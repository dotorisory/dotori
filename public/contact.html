<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dotori School</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    @media (max-width: 768px) {
        .contact-section {
            padding-top: 32px !important;
        }
    }
    @media (min-width: 769px) {
        .contact-section {
            padding-top: 90px !important;
        }
    }
    </style>
    <link rel="icon" type="image/x-icon" href="assets/images/logo.png">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">
                <a href="/">
                    <img src="assets/images/logo.png" alt="Dotori School Logo" style="max-width: 80px;" class="logo-img">
                    <span class="logo-text" style="display:none; font-size:1.5rem; font-weight:700; color:#6b5b47;">Dotori School</span>
                </a>
            </div>
            <button class="nav-toggle" aria-label="Toggle navigation" style="background:none; border:none; font-size:2rem; color:#6b5b47; display:none; position:absolute; right:24px; top:18px; z-index:1001;">
                &#9776;
            </button>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/team">Our Team</a></li>
                <li><a href="/programs">Programs</a></li>
                <li><a href="/contact" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="container contact-section" style="max-width:700px; margin:48px auto;">
        <div style="background:#fff; border-radius:18px; box-shadow:0 4px 24px rgba(0,0,0,0.08); padding:2.5rem 2rem;">
            <h1 style="text-align:center; color:#6b5b47; margin-bottom:2rem;">Contact Us</h1>
            <form id="contactForm" style="display:flex; flex-direction:column; gap:1.2rem;" autocomplete="off">
                <!-- Parent Information -->
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                    <div>
                        <label for="parentFirstName" style="color:#6b5b47; font-weight:600;">Parent First Name <span style="color:#e74c3c;">*</span></label><br>
                        <input type="text" id="parentFirstName" name="parentFirstName" required style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ddd; margin-top:0.3rem;">
                    </div>
                    <div>
                        <label for="parentLastName" style="color:#6b5b47; font-weight:600;">Parent Last Name <span style="color:#e74c3c;">*</span></label><br>
                        <input type="text" id="parentLastName" name="parentLastName" required style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ddd; margin-top:0.3rem;">
                    </div>
                </div>
                
                <div>
                    <label for="email" style="color:#6b5b47; font-weight:600;">Parent Email <span style="color:#e74c3c;">*</span></label><br>
                    <input type="email" id="email" name="email" required style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ddd; margin-top:0.3rem;">
                </div>
                
                <div>
                    <label for="phone" style="color:#6b5b47; font-weight:600;">Phone Number <span style="color:#e74c3c;">*</span></label><br>
                    <input type="tel" id="phone" name="phone" required style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ddd; margin-top:0.3rem;">
                </div>

                <!-- Student Information -->
                <div id="studentContainer">
                    <div class="student-info" style="margin-bottom:1rem;">
                        <div>
                            <label for="studentFirstName1" style="color:#6b5b47; font-weight:600;">Student First Name <span style="color:#e74c3c;">*</span></label><br>
                            <input type="text" id="studentFirstName1" name="studentFirstName1" required style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ddd; margin-top:0.3rem;">
                        </div>
                    </div>
                </div>

                <!-- Add Another Student Button -->
                <div>
                    <button type="button" id="addStudentBtn" style="color:#6b5b47; background:none; border:none; font-size:1rem; cursor:pointer; display:flex; align-items:center; gap:0.5rem; padding:0.5rem 0;">
                        <span style="font-size:1.2rem;">⊕</span> Add another student
                    </button>
                </div>

                <!-- Newsletter Subscription -->
                <div style="margin:1rem 0;">
                    <label style="display:flex; align-items:flex-start; gap:0.5rem; color:#6b5b47; cursor:pointer;">
                        <input type="checkbox" id="newsletter" name="newsletter" style="margin-top:0.2rem;">
                        <span>Yes, I would like to receive information about new courses, seasonal schedules, and event announcements from Dotori School.</span>
                    </label>
                </div>

                <!-- Message Field -->
                <div>
                    <label for="message" style="color:#6b5b47; font-weight:600;">Message</label><br>
                    <textarea id="message" name="message" rows="5" style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ddd; margin-top:0.3rem;"></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="padding:0.8rem 2rem; border-radius:30px; background:#d2691e; color:#fff; font-size:1.1rem; font-weight:600; border:none; margin-top:1rem;">SUBMIT</button>
            </form>
            <div id="formMessage" style="margin-top:1rem; text-align:center;"></div>
            <div style="margin-top:2.5rem; text-align:center; color:#888;">
                <p><strong>Email:</strong> info@dotorischool.org</p>
                <p><strong>Phone:</strong> (425) 405-0822 (Please leave a voice or text message)</p>
                <p><strong>Address:</strong> 12721 NE Bel Red Rd. #220 Bellevue WA 98005</p>
            </div>
        </div>
    </section>

    <footer style="background:#f7f5f2; padding:2rem 0; text-align:center; color:#888;">
        <div class="container">
            <p style="margin:0;">&copy; 2025 Dotori School. All rights reserved.</p>
        </div>
    </footer>

    <script>
    // Mobile navbar toggle
    document.addEventListener('DOMContentLoaded', function() {
        const navToggle = document.querySelector('.nav-toggle');
        const navLinks = document.querySelector('.nav-links');
        navToggle.style.display = 'block';
        navToggle.addEventListener('click', function() {
            navLinks.classList.toggle('nav-open');
        });

        // Add student functionality
        let studentCount = 1;
        const addStudentBtn = document.getElementById('addStudentBtn');
        const studentContainer = document.getElementById('studentContainer');
        
        if (addStudentBtn) {
            addStudentBtn.addEventListener('click', function() {
                studentCount++;
                const newStudent = document.createElement('div');
                newStudent.className = 'student-info';
                newStudent.style.cssText = 'margin-bottom:1rem; position:relative;';
                newStudent.innerHTML = `
                    <div>
                        <label for="studentFirstName${studentCount}" style="color:#6b5b47; font-weight:600;">Student First Name <span style="color:#e74c3c;">*</span></label><br>
                        <input type="text" id="studentFirstName${studentCount}" name="studentFirstName${studentCount}" required style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ddd; margin-top:0.3rem;">
                    </div>
                    <button type="button" class="remove-student" style="position:absolute; top:0; right:0; background:#e74c3c; color:white; border:none; border-radius:50%; width:24px; height:24px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;">×</button>
                `;
                
                studentContainer.appendChild(newStudent);
                
                // Add remove functionality
                const removeBtn = newStudent.querySelector('.remove-student');
                removeBtn.addEventListener('click', function() {
                    newStudent.remove();
                });
            });
        }

        // Contact form submission
        const form = document.getElementById('contactForm');
        const formMessage = document.getElementById('formMessage');
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                formMessage.textContent = '';
                
                // Collect all form data
                const formData = new FormData(form);
                const data = {};
                
                // Get parent information
                data.parentFirstName = formData.get('parentFirstName');
                data.parentLastName = formData.get('parentLastName');
                data.email = formData.get('email');
                data.phone = formData.get('phone');
                data.message = formData.get('message') || '';
                data.newsletter = formData.get('newsletter') === 'on';
                
                // Get all student names
                data.students = [];
                for (let i = 1; i <= studentCount; i++) {
                    const studentName = formData.get(`studentFirstName${i}`);
                    if (studentName && studentName.trim()) {
                        data.students.push(studentName.trim());
                    }
                }

                try {
                    const res = await fetch('/api/contact', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (res.ok) {
                        form.reset();
                        formMessage.style.color = '#6b5b47';
                        formMessage.textContent = 'Thank you! Your message has been sent.';
                        
                        // Reset student count and container
                        studentCount = 1;
                        const studentInfos = studentContainer.querySelectorAll('.student-info');
                        for (let i = 1; i < studentInfos.length; i++) {
                            studentInfos[i].remove();
                        }
                    } else {
                        const data = await res.json();
                        formMessage.style.color = 'red';
                        formMessage.textContent = data.error || 'Failed to send message. Please try again.';
                    }
                } catch (err) {
                    formMessage.style.color = 'red';
                    formMessage.textContent = 'Network error. Please try again.';
                }
            });
        }
    });
    </script>
    <style>
    @media (max-width: 768px) {
        .logo-img {
            display: none !important;
        }
        .logo-text {
            display: inline-block !important;
        }
        nav.container {
            position: relative;
            min-height: 56px;
            padding: 0 1rem;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
        }
        body {
            padding-top: 56px;
        }
        .nav-toggle {
            display: block !important;
            right: 18px;
            top: 50%;
            transform: translateY(-30%);
            z-index: 1001;
        }
        .nav-links {
            position: absolute;
            top: 56px;
            right: 0;
            background: #fff;
            width: 100%;
            flex-direction: column;
            align-items: flex-start;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            display: none;
            z-index: 1000;
        }
        .nav-links.nav-open {
            display: flex;
        }
        .nav-links li {
            width: 100%;
            padding: 1rem 2rem;
            border-bottom: 1px solid #eee;
        }
        
        /* Form responsive styles */
        #contactForm > div:first-child {
            grid-template-columns: 1fr !important;
        }
    }
    @media (min-width: 769px) {
        nav.container {
            z-index: 1002;
        }
        body {
            padding-top: 0;
        }
        .nav-toggle {
            display: none !important;
        }
        .nav-links {
            position: static;
            display: flex !important;
            flex-direction: row;
            background: none;
            box-shadow: none;
            width: auto;
        }
        .nav-links li {
            padding: 0 1rem;
            border-bottom: none;
        }
    }
    </style>
</body>
</html>

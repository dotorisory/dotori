<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Programs - Dotori School</title>
</head>
<body>
    <h1 id="h1">Zihan's math class</h1>
    <h2>Welcome to the world of numbers!</h2>

    <p>Explore fun and interactive math programs designed to enhance your skills and ignite your passion for learning.</p>
    <script>
        // when h1 is clicked alert "You clicked the title!"
        document.querySelector('h1').addEventListener('click', function() {
            alert('You clicked the title!');
            document.getElementById('h1').style.color = 'blue';
        });
    </script>
</body>
</html>

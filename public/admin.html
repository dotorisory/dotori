<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Dotori School</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="assets/images/logo.png">
</head>
<body>
  <header>
    <nav class="container">
      <div class="logo">
        <a href="/">
          <img src="assets/images/logo.png" alt="Dotori School" style="max-width:80px;" class="logo-img">
          <span class="logo-text" style="display:none; font-size:1.5rem; font-weight:700; color:#6b5b47;">Dotori School</span>
        </a>
      </div>
      <ul class="nav-links" style="display:flex;">
        <li><a href="/">Home</a></li>
        <li><a href="/programs">Programs</a></li>
        <li><a href="/profile">My Account</a></li>
        <li><a href="/admin" class="active">Admin</a></li>
        <li><a href="#" onclick="logout(); return false;" style="color:#e88080;">Log Out</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="container" style="padding:2rem 1rem 4rem;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem;">
        <h1 style="color:#6b5b47; margin:0; font-size:1.8rem;">Admin Dashboard</h1>
        <span id="admin-name" style="color:#aaa; font-size:0.9rem;"></span>
      </div>

      <!-- Stats bar -->
      <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem; margin-bottom:2rem;" id="stats-bar">
        <div class="stat-card" id="stat-families"></div>
        <div class="stat-card" id="stat-enrollments"></div>
        <div class="stat-card" id="stat-paid"></div>
        <div class="stat-card" id="stat-pending"></div>
      </div>

      <!-- Tabs -->
      <div style="display:flex; gap:0; border-bottom:2px solid #eee; margin-bottom:2rem; overflow-x:auto;">
        <button class="tab-btn active" data-tab="families" onclick="switchTab('families')">Families</button>
        <button class="tab-btn" data-tab="enrollments" onclick="switchTab('enrollments')">Enrollments</button>
        <button class="tab-btn" data-tab="classes" onclick="switchTab('classes')">Classes</button>
        <button class="tab-btn" data-tab="reports" onclick="switchTab('reports')">Reports</button>
        <button class="tab-btn" data-tab="products" onclick="switchTab('products')">Products</button>
        <button class="tab-btn" data-tab="orders" onclick="switchTab('orders')">Shop Orders</button>
      </div>

      <!-- FAMILIES -->
      <div id="tab-families" class="tab-panel">
        <div style="margin-bottom:1rem;">
          <input type="text" id="family-search" placeholder="Search by name or email…" oninput="filterFamilies()"
            style="padding:0.65rem 1rem; border:1.5px solid #ddd; border-radius:8px; font-size:0.9rem; width:260px; max-width:100%;">
        </div>
        <div id="families-table" style="overflow-x:auto;"><p style="color:#aaa;">Loading…</p></div>
      </div>

      <!-- ENROLLMENTS -->
      <div id="tab-enrollments" class="tab-panel" style="display:none;">
        <div style="display:flex; gap:0.8rem; margin-bottom:1rem; flex-wrap:wrap;">
          <select id="enroll-quarter" onchange="loadEnrollments()"
            style="padding:0.6rem 0.8rem; border:1.5px solid #ddd; border-radius:8px; font-size:0.9rem; background:#fff;">
            <option value="">All Quarters</option>
            <option value="fall-2025">Fall 2025</option>
            <option value="winter-2026">Winter 2026</option>
            <option value="spring-2026">Spring 2026</option>
            <option value="summer-2026">Summer 2026</option>
          </select>
          <select id="enroll-status" onchange="loadEnrollments()"
            style="padding:0.6rem 0.8rem; border:1.5px solid #ddd; border-radius:8px; font-size:0.9rem; background:#fff;">
            <option value="">All Statuses</option>
            <option value="paid">Paid</option>
            <option value="pending">Pending</option>
            <option value="refunded">Refunded</option>
          </select>
        </div>
        <div id="enrollments-table" style="overflow-x:auto;"><p style="color:#aaa;">Loading…</p></div>
      </div>

      <!-- CLASSES -->
      <div id="tab-classes" class="tab-panel" style="display:none;">
        <!-- Add class form -->
        <div style="border:1px solid #eee; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; max-width:600px;">
          <h3 style="color:#6b5b47; margin:0 0 1rem; font-size:1rem;">Add New Class</h3>
          <div id="class-form-msg" style="display:none; border-radius:8px; padding:0.6rem 1rem; margin-bottom:0.8rem; font-size:0.85rem;"></div>
          <form id="class-form" style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem;">
            <div style="grid-column:1/-1;">
              <label class="flabel">Class Name</label>
              <input type="text" id="cls-name" required placeholder="e.g. Korean Reading – Gr. 2-3" class="finput">
            </div>
            <div>
              <label class="flabel">Category</label>
              <select id="cls-cat" class="finput">
                <option value="reading">Reading</option>
                <option value="writing">Writing</option>
                <option value="korean">Korean</option>
                <option value="1on1">1:1</option>
                <option value="summer">Summer Camp</option>
              </select>
            </div>
            <div>
              <label class="flabel">Quarter</label>
              <select id="cls-quarter" class="finput">
                <option value="fall-2025">Fall 2025</option>
                <option value="winter-2026">Winter 2026</option>
                <option value="spring-2026">Spring 2026</option>
                <option value="summer-2026">Summer 2026</option>
              </select>
            </div>
            <div>
              <label class="flabel">Price ($)</label>
              <input type="number" id="cls-price" required min="0" step="0.01" placeholder="350" class="finput">
            </div>
            <div>
              <label class="flabel">Capacity</label>
              <input type="number" id="cls-cap" value="20" min="1" class="finput">
            </div>
            <div style="grid-column:1/-1;">
              <label class="flabel">Schedule</label>
              <input type="text" id="cls-schedule" placeholder="e.g. Saturdays 10–11am" class="finput">
            </div>
            <div style="grid-column:1/-1;">
              <label class="flabel">Description</label>
              <input type="text" id="cls-desc" placeholder="Short description (optional)" class="finput">
            </div>
            <div style="grid-column:1/-1;">
              <button type="submit" style="background:#e8a87c; color:#fff; border:none; border-radius:8px; padding:0.7rem 1.5rem; font-weight:700; cursor:pointer; font-size:0.95rem;">Add Class</button>
            </div>
          </form>
        </div>
        <div id="classes-table" style="overflow-x:auto;"><p style="color:#aaa;">Loading…</p></div>
      </div>

      <!-- REPORTS -->
      <div id="tab-reports" class="tab-panel" style="display:none;">
        <!-- Upload form -->
        <div style="border:1px solid #eee; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; max-width:560px;">
          <h3 style="color:#6b5b47; margin:0 0 1rem; font-size:1rem;">Upload Report Card (PDF)</h3>
          <div id="report-form-msg" style="display:none; border-radius:8px; padding:0.6rem 1rem; margin-bottom:0.8rem; font-size:0.85rem;"></div>
          <form id="report-form" style="display:flex; flex-direction:column; gap:0.8rem;" enctype="multipart/form-data">
            <div>
              <label class="flabel">Family</label>
              <select id="rpt-family" class="finput" onchange="updateStudentDropdown()">
                <option value="">Select family…</option>
              </select>
            </div>
            <div>
              <label class="flabel">Student</label>
              <select id="rpt-student" class="finput">
                <option value="">Select student…</option>
              </select>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem;">
              <div>
                <label class="flabel">Quarter</label>
                <select id="rpt-quarter" class="finput">
                  <option value="fall-2025">Fall 2025</option>
                  <option value="winter-2026">Winter 2026</option>
                  <option value="spring-2026">Spring 2026</option>
                  <option value="summer-2026">Summer 2026</option>
                </select>
              </div>
              <div>
                <label class="flabel">Title</label>
                <input type="text" id="rpt-title" class="finput" placeholder="e.g. Fall 2025 Progress Report">
              </div>
            </div>
            <div>
              <label class="flabel">PDF File</label>
              <input type="file" id="rpt-file" accept="application/pdf" required style="font-size:0.9rem;">
            </div>
            <button type="submit" style="background:#e8a87c; color:#fff; border:none; border-radius:8px; padding:0.7rem 1.5rem; font-weight:700; cursor:pointer; font-size:0.95rem; align-self:flex-start;">Upload Report</button>
          </form>
        </div>
        <div id="reports-table" style="overflow-x:auto;"><p style="color:#aaa;">Loading…</p></div>
      </div>

      <!-- PRODUCTS -->
      <div id="tab-products" class="tab-panel" style="display:none;">
        <div style="border:1px solid #eee; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; max-width:640px;">
          <h3 style="color:#6b5b47; margin:0 0 1rem; font-size:1rem;">Add New Product</h3>
          <div id="product-form-msg" style="display:none; border-radius:8px; padding:0.6rem 1rem; margin-bottom:0.8rem; font-size:0.85rem;"></div>
          <form id="product-form" style="display:flex; flex-direction:column; gap:0.8rem;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem;">
              <div><label class="flabel">Product Name *</label><input type="text" id="prod-name" required class="finput" oninput="autoSlug()"></div>
              <div><label class="flabel">Slug (URL key) *</label><input type="text" id="prod-slug" required class="finput" placeholder="e.g. dotori-textbook-gr3"></div>
            </div>
            <div><label class="flabel">Description</label><input type="text" id="prod-desc" class="finput"></div>
            <div><label class="flabel">Image URL</label><input type="text" id="prod-image" class="finput" placeholder="https://... or /uploads/..."></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem;">
              <div>
                <label class="flabel">Fulfiller *</label>
                <select id="prod-fulfiller" class="finput">
                  <option value="printful">Printful (Merchandise)</option>
                  <option value="lulu">Lulu (Textbook)</option>
                  <option value="manual">Manual / Physical</option>
                </select>
              </div>
            </div>
            <div>
              <label class="flabel">Variants</label>
              <div id="variant-rows"></div>
              <button type="button" onclick="addVariantRow()" style="background:#f5f0eb; color:#6b5b47; border:none; border-radius:6px; padding:0.4rem 0.8rem; cursor:pointer; font-size:0.85rem; margin-top:0.4rem;">+ Add Variant</button>
            </div>
            <button type="submit" style="background:#e8a87c; color:#fff; border:none; border-radius:8px; padding:0.7rem 1.5rem; font-weight:700; cursor:pointer; font-size:0.95rem; align-self:flex-start;">Add Product</button>
          </form>
        </div>
        <div id="products-table" style="overflow-x:auto;"><p style="color:#aaa;">Loading…</p></div>
      </div>

      <!-- SHOP ORDERS -->
      <div id="tab-orders" class="tab-panel" style="display:none;">
        <div style="display:flex; gap:0.8rem; margin-bottom:1.2rem; flex-wrap:wrap; align-items:center;">
          <select id="order-filter-pay" onchange="loadAdminOrders()" style="padding:0.5rem 0.8rem; border:1.5px solid #ddd; border-radius:8px; font-size:0.9rem; background:#fff;">
            <option value="">All Payments</option>
            <option value="paid">Paid</option>
            <option value="pending">Pending</option>
            <option value="refunded">Refunded</option>
          </select>
          <select id="order-filter-fulfill" onchange="loadAdminOrders()" style="padding:0.5rem 0.8rem; border:1.5px solid #ddd; border-radius:8px; font-size:0.9rem; background:#fff;">
            <option value="">All Fulfillment</option>
            <option value="unfulfilled">Unfulfilled</option>
            <option value="partial">In Production</option>
            <option value="fulfilled">Fulfilled</option>
            <option value="error">Error</option>
          </select>
        </div>
        <div id="orders-table" style="overflow-x:auto;"><p style="color:#aaa;">Loading…</p></div>
      </div>

    </div>
  </main>

  <!-- Order Edit Modal -->
  <div id="order-edit-modal" style="display:none; position:fixed; inset:0; background:#0006; z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:16px; padding:2rem; width:100%; max-width:440px; margin:1rem; box-shadow:0 8px 40px #0003;">
      <h3 style="color:#6b5b47; margin:0 0 1.2rem; font-size:1.05rem;">Update Order</h3>
      <div id="order-edit-msg" style="display:none;"></div>
      <div style="display:flex; flex-direction:column; gap:0.8rem;">
        <div><label class="flabel">Tracking Number</label><input type="text" id="oedit-tracking" class="finput"></div>
        <div><label class="flabel">Tracking URL</label><input type="text" id="oedit-trackingUrl" class="finput"></div>
        <div><label class="flabel">Carrier</label><input type="text" id="oedit-carrier" class="finput" placeholder="USPS, UPS, FedEx…"></div>
        <div>
          <label class="flabel">Fulfillment Status</label>
          <select id="oedit-status" class="finput">
            <option value="">— no change —</option>
            <option value="unfulfilled">Unfulfilled</option>
            <option value="partial">In Production</option>
            <option value="fulfilled">Fulfilled</option>
            <option value="error">Error</option>
          </select>
        </div>
        <div style="display:flex; gap:0.8rem; margin-top:0.4rem;">
          <button onclick="saveOrderEdit()" style="flex:1; background:#6b5b47; color:#fff; border:none; border-radius:8px; padding:0.7rem; font-weight:700; cursor:pointer;">Save</button>
          <button onclick="closeOrderEdit()" style="flex:1; background:#f5f0eb; color:#6b5b47; border:none; border-radius:8px; padding:0.7rem; font-weight:700; cursor:pointer;">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Class Modal -->
  <div id="edit-class-modal" style="display:none; position:fixed; inset:0; background:#0006; z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:16px; padding:2rem; width:100%; max-width:480px; margin:1rem; box-shadow:0 8px 40px #0003;">
      <h3 style="color:#6b5b47; margin:0 0 1.2rem; font-size:1.05rem;">Edit Class</h3>
      <div id="edit-class-msg" style="display:none; border-radius:8px; padding:0.6rem 1rem; margin-bottom:0.8rem; font-size:0.85rem;"></div>
      <div style="display:flex; flex-direction:column; gap:0.8rem;">
        <div><label class="flabel">Class Name</label><input type="text" id="edit-cls-name" class="finput"></div>
        <div><label class="flabel">Schedule</label><input type="text" id="edit-cls-schedule" class="finput"></div>
        <div><label class="flabel">Description</label><input type="text" id="edit-cls-desc" class="finput"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem;">
          <div><label class="flabel">Price ($)</label><input type="number" id="edit-cls-price" class="finput" min="0"></div>
          <div><label class="flabel">Capacity</label><input type="number" id="edit-cls-cap" class="finput" min="1"></div>
        </div>
        <div style="display:flex; gap:0.8rem; margin-top:0.4rem;">
          <button onclick="saveClassEdit()" style="flex:1; background:#6b5b47; color:#fff; border:none; border-radius:8px; padding:0.7rem; font-weight:700; cursor:pointer; font-size:0.9rem;">Save Changes</button>
          <button onclick="closeEditClass()" style="flex:1; background:#f5f0eb; color:#6b5b47; border:none; border-radius:8px; padding:0.7rem; font-weight:700; cursor:pointer; font-size:0.9rem;">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allFamilies = [];
    const quarterLabel = { 'fall-2025':'Fall 2025','winter-2026':'Winter 2026','spring-2026':'Spring 2026','summer-2026':'Summer 2026' };

    async function init() {
      const res = await fetch('/api/auth/me');
      const data = await res.json();
      if (!data.user || data.user.role !== 'admin') {
        window.location.href = '/login'; return;
      }
      document.getElementById('admin-name').textContent = `Logged in as ${data.user.firstName} ${data.user.lastName}`;
      loadFamilies();
      loadStats();
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(`tab-${tab}`).style.display = 'block';
      if (tab === 'families') loadFamilies();
      if (tab === 'enrollments') loadEnrollments();
      if (tab === 'classes') loadAdminClasses();
      if (tab === 'reports') loadReports();
      if (tab === 'products') loadAdminProducts();
      if (tab === 'orders') loadAdminOrders();
    }

    async function loadStats() {
      const [fRes, eRes] = await Promise.all([
        fetch('/api/admin/families'),
        fetch('/api/admin/enrollments'),
      ]);
      const { families } = await fRes.json();
      const { enrollments } = await eRes.json();
      const paid = enrollments.filter(e => e.paymentStatus === 'paid').length;
      const pending = enrollments.filter(e => e.paymentStatus === 'pending').length;
      const revenue = enrollments.filter(e => e.paymentStatus === 'paid').reduce((s, e) => s + (e.amountPaid || 0), 0);
      document.getElementById('stat-families').innerHTML = statCard('Families', families.length, '#e8a87c');
      document.getElementById('stat-enrollments').innerHTML = statCard('Enrollments', enrollments.length, '#7ab3d4');
      document.getElementById('stat-paid').innerHTML = statCard('Paid', paid + ` ($${revenue})`, '#7cbf8e');
      document.getElementById('stat-pending').innerHTML = statCard('Pending', pending, '#f7c948');
    }

    function statCard(label, value, color) {
      return `<div style="border-left:4px solid ${color}; border-radius:8px; background:#fff; padding:1rem 1.2rem; box-shadow:0 2px 8px rgba(0,0,0,0.06);">
        <div style="color:#aaa; font-size:0.78rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">${label}</div>
        <div style="color:#6b5b47; font-size:1.4rem; font-weight:800; margin-top:0.2rem;">${value}</div>
      </div>`;
    }

    async function loadFamilies() {
      const res = await fetch('/api/admin/families');
      const data = await res.json();
      allFamilies = data.families || [];
      renderFamiliesTable(allFamilies);
      // Populate family dropdown in reports
      const sel = document.getElementById('rpt-family');
      if (sel) {
        sel.innerHTML = '<option value="">Select family…</option>' +
          allFamilies.map(f => `<option value="${f._id}" data-students='${JSON.stringify(f.students||[])}'>${f.firstName} ${f.lastName} (${f.email})</option>`).join('');
      }
    }

    function filterFamilies() {
      const q = document.getElementById('family-search').value.toLowerCase();
      const filtered = allFamilies.filter(f =>
        (f.firstName + ' ' + f.lastName).toLowerCase().includes(q) ||
        f.email.toLowerCase().includes(q)
      );
      renderFamiliesTable(filtered);
    }

    function renderFamiliesTable(families) {
      const el = document.getElementById('families-table');
      if (!families.length) { el.innerHTML = '<p style="color:#aaa;">No families found.</p>'; return; }
      el.innerHTML = `<table class="admin-table">
        <thead><tr>
          <th>Name</th><th>Email</th><th>Phone</th><th>Students</th><th>Enrollments</th><th>Joined</th>
        </tr></thead>
        <tbody>${families.map(f => `<tr>
          <td><strong>${f.firstName} ${f.lastName}</strong></td>
          <td>${f.email}</td>
          <td>${f.phone || '—'}</td>
          <td>${(f.students||[]).map(s => s.name + (s.grade ? ' (Gr. '+s.grade+')' : '')).join('<br>') || '—'}</td>
          <td style="text-align:center;">${f.enrollmentCount}</td>
          <td>${new Date(f.createdAt).toLocaleDateString()}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    async function loadEnrollments() {
      const quarter = document.getElementById('enroll-quarter').value;
      const status = document.getElementById('enroll-status').value;
      let url = '/api/admin/enrollments?';
      if (quarter) url += `quarter=${quarter}&`;
      if (status) url += `status=${status}`;
      const res = await fetch(url);
      const data = await res.json();
      const el = document.getElementById('enrollments-table');
      if (!data.enrollments || !data.enrollments.length) {
        el.innerHTML = '<p style="color:#aaa;">No enrollments found.</p>'; return;
      }
      el.innerHTML = `<table class="admin-table">
        <thead><tr>
          <th>Family</th><th>Student</th><th>Class</th><th>Quarter</th><th>Price</th><th>Status</th><th>Date</th><th>Actions</th>
        </tr></thead>
        <tbody>${data.enrollments.map(e => {
          const u = e.userId || {};
          const c = e.classId || {};
          const statusColor = { paid:'#1e7a40', pending:'#b85e1a', refunded:'#888' }[e.paymentStatus] || '#888';
          return `<tr>
            <td>${u.firstName||''} ${u.lastName||''}<br><span style="color:#aaa;font-size:0.78rem;">${u.email||''}</span></td>
            <td>${e.studentName}</td>
            <td>${c.name || '—'}<br><span style="color:#aaa;font-size:0.78rem;">${c.schedule||''}</span></td>
            <td>${quarterLabel[e.quarter]||e.quarter}</td>
            <td>
              <div style="display:flex;align-items:center;gap:0.3rem;">
                <span style="color:#aaa;font-size:0.85rem;">$</span>
                <input type="number" value="${e.amountPaid||0}" min="0" step="1"
                  id="price-${e._id}"
                  style="width:70px;padding:0.25rem 0.4rem;border:1.5px solid #ddd;border-radius:6px;font-size:0.85rem;text-align:right;"
                  onchange="setPrice('${e._id}', this.value)">
              </div>
            </td>
            <td><span style="color:${statusColor}; font-weight:700; font-size:0.82rem;">${e.paymentStatus}</span></td>
            <td style="font-size:0.82rem;">${new Date(e.enrolledAt).toLocaleDateString()}</td>
            <td>
              ${e.paymentStatus !== 'paid' ? `<button onclick="updateEnrollment('${e._id}','paid')" style="background:#e8f5ec;color:#1e7a40;border:none;border-radius:6px;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.8rem;margin-right:4px;font-weight:600;">Mark Paid</button>` : ''}
              ${e.paymentStatus !== 'refunded' ? `<button onclick="updateEnrollment('${e._id}','refunded')" style="background:#f5f0eb;color:#888;border:none;border-radius:6px;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.8rem;font-weight:600;">Refund</button>` : ''}
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
    }

    async function setPrice(id, amount) {
      await fetch(`/api/admin/enrollments/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amountPaid: amount }),
      });
    }

    async function updateEnrollment(id, status) {
      const priceInput = document.getElementById(`price-${id}`);
      const amountPaid = priceInput ? priceInput.value : undefined;
      const res = await fetch(`/api/admin/enrollments/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentStatus: status, amountPaid }),
      });
      if (res.ok) { loadEnrollments(); loadStats(); }
    }

    async function loadAdminClasses() {
      const res = await fetch('/api/admin/classes');
      const data = await res.json();
      const el = document.getElementById('classes-table');
      if (!data.classes || !data.classes.length) {
        el.innerHTML = '<p style="color:#aaa;">No classes yet. Add one above.</p>'; return;
      }
      el.innerHTML = `<table class="admin-table">
        <thead><tr><th>Name</th><th>Category</th><th>Quarter</th><th>Schedule</th><th>Price</th><th>Enrolled</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${data.classes.map(c => `<tr>
          <td><strong>${c.name}</strong><br><span style="color:#aaa;font-size:0.78rem;">${c.description||''}</span></td>
          <td>${c.category}</td>
          <td>${quarterLabel[c.quarter]||c.quarter}</td>
          <td>${c.schedule||'—'}</td>
          <td>$${c.price}</td>
          <td>${c.enrolledCount}/${c.capacity}</td>
          <td><span style="color:${c.active?'#1e7a40':'#aaa'}; font-weight:600; font-size:0.82rem;">${c.active?'Active':'Inactive'}</span></td>
          <td>
            <button onclick="openEditClass('${c._id}','${c.name.replace(/'/g,"\\'")}','${(c.schedule||'').replace(/'/g,"\\'")}','${(c.description||'').replace(/'/g,"\\'")}',${c.price},${c.capacity})" style="background:#e8f0fb;color:#2a5db0;border:none;border-radius:6px;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.8rem;font-weight:600;margin-right:4px;">Edit</button>
            <button onclick="toggleClass('${c._id}', ${!c.active})" style="background:#f5f0eb;color:#6b5b47;border:none;border-radius:6px;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.8rem;font-weight:600;margin-right:4px;">
              ${c.active ? 'Deactivate' : 'Activate'}
            </button>
            <button onclick="deleteClass('${c._id}')" style="background:#fdeaea;color:#e00;border:none;border-radius:6px;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.8rem;font-weight:600;">Delete</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    document.getElementById('class-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('class-form-msg');
      const res = await fetch('/api/admin/classes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('cls-name').value,
          category: document.getElementById('cls-cat').value,
          quarter: document.getElementById('cls-quarter').value,
          price: document.getElementById('cls-price').value,
          capacity: document.getElementById('cls-cap').value,
          schedule: document.getElementById('cls-schedule').value,
          description: document.getElementById('cls-desc').value,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        msgEl.style.cssText = 'display:block;background:#e8f5ec;border:1px solid #7cbf8e;color:#1e7a40;border-radius:8px;padding:0.6rem 1rem;margin-bottom:0.8rem;font-size:0.85rem;';
        msgEl.textContent = `Class "${data.class.name}" created!`;
        document.getElementById('class-form').reset();
        loadAdminClasses();
        setTimeout(() => msgEl.style.display = 'none', 3000);
      } else {
        msgEl.style.cssText = 'display:block;background:#fdeaea;border:1px solid #e88080;color:#b00;border-radius:8px;padding:0.6rem 1rem;margin-bottom:0.8rem;font-size:0.85rem;';
        msgEl.textContent = data.error || 'Failed to create class.';
      }
    });

    let editingClassId = null;
    function openEditClass(id, name, schedule, description, price, capacity) {
      editingClassId = id;
      document.getElementById('edit-cls-name').value = name;
      document.getElementById('edit-cls-schedule').value = schedule;
      document.getElementById('edit-cls-desc').value = description;
      document.getElementById('edit-cls-price').value = price;
      document.getElementById('edit-cls-cap').value = capacity;
      document.getElementById('edit-class-msg').style.display = 'none';
      document.getElementById('edit-class-modal').style.display = 'flex';
    }
    function closeEditClass() {
      document.getElementById('edit-class-modal').style.display = 'none';
      editingClassId = null;
    }
    async function saveClassEdit() {
      const msgEl = document.getElementById('edit-class-msg');
      const res = await fetch(`/api/admin/classes/${editingClassId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('edit-cls-name').value,
          schedule: document.getElementById('edit-cls-schedule').value,
          description: document.getElementById('edit-cls-desc').value,
          price: document.getElementById('edit-cls-price').value,
          capacity: document.getElementById('edit-cls-cap').value,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        closeEditClass();
        loadAdminClasses();
      } else {
        msgEl.style.cssText = 'display:block; background:#fdeaea; color:#c00;';
        msgEl.textContent = data.error || 'Failed to update class.';
      }
    }

    async function toggleClass(id, active) {
      await fetch(`/api/admin/classes/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ active }) });
      loadAdminClasses();
    }

    async function deleteClass(id) {
      if (!confirm('Delete this class? This cannot be undone.')) return;
      await fetch(`/api/admin/classes/${id}`, { method: 'DELETE' });
      loadAdminClasses();
    }

    async function loadReports() {
      const res = await fetch('/api/admin/reports');
      const data = await res.json();
      const el = document.getElementById('reports-table');
      if (!data.reports || !data.reports.length) {
        el.innerHTML = '<p style="color:#aaa;">No reports uploaded yet.</p>'; return;
      }
      el.innerHTML = `<table class="admin-table">
        <thead><tr><th>Title</th><th>Family</th><th>Student</th><th>Quarter</th><th>Class</th><th>Uploaded</th><th>Actions</th></tr></thead>
        <tbody>${data.reports.map(r => {
          const u = r.userId || {};
          return `<tr>
            <td><a href="/${r.pdfPath}" target="_blank" style="color:#e8a87c;font-weight:600;">📄 ${r.title}</a></td>
            <td>${u.firstName||''} ${u.lastName||''}</td>
            <td>${r.studentName}</td>
            <td>${quarterLabel[r.quarter]||r.quarter}</td>
            <td>${r.classId ? r.classId.name : '—'}</td>
            <td style="font-size:0.82rem;">${new Date(r.uploadedAt).toLocaleDateString()}</td>
            <td><button onclick="deleteReport('${r._id}')" style="background:#fdeaea;color:#e00;border:none;border-radius:6px;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.8rem;font-weight:600;">Delete</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
    }

    function updateStudentDropdown() {
      const sel = document.getElementById('rpt-family');
      const selected = sel.options[sel.selectedIndex];
      const students = selected ? JSON.parse(selected.dataset.students || '[]') : [];
      const sSel = document.getElementById('rpt-student');
      sSel.innerHTML = '<option value="">Select student…</option>' +
        students.map(s => `<option value="${s.name}">${s.name}${s.grade ? ' (Gr. '+s.grade+')' : ''}</option>`).join('');
    }

    document.getElementById('report-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('report-form-msg');
      const formData = new FormData();
      formData.append('userId', document.getElementById('rpt-family').value);
      formData.append('studentName', document.getElementById('rpt-student').value);
      formData.append('quarter', document.getElementById('rpt-quarter').value);
      formData.append('title', document.getElementById('rpt-title').value);
      formData.append('pdf', document.getElementById('rpt-file').files[0]);

      if (!formData.get('userId') || !formData.get('studentName') || !formData.get('title')) {
        msgEl.style.cssText = 'display:block;background:#fdeaea;border:1px solid #e88080;color:#b00;border-radius:8px;padding:0.6rem 1rem;margin-bottom:0.8rem;font-size:0.85rem;';
        msgEl.textContent = 'Please fill in all fields.';
        return;
      }

      const res = await fetch('/api/admin/reports/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (res.ok) {
        msgEl.style.cssText = 'display:block;background:#e8f5ec;border:1px solid #7cbf8e;color:#1e7a40;border-radius:8px;padding:0.6rem 1rem;margin-bottom:0.8rem;font-size:0.85rem;';
        msgEl.textContent = 'Report uploaded successfully!';
        document.getElementById('report-form').reset();
        loadReports();
        setTimeout(() => msgEl.style.display = 'none', 3000);
      } else {
        msgEl.style.cssText = 'display:block;background:#fdeaea;border:1px solid #e88080;color:#b00;border-radius:8px;padding:0.6rem 1rem;margin-bottom:0.8rem;font-size:0.85rem;';
        msgEl.textContent = data.error || 'Upload failed.';
      }
    });

    async function deleteReport(id) {
      if (!confirm('Delete this report? The PDF file will also be removed.')) return;
      await fetch(`/api/admin/reports/${id}`, { method: 'DELETE' });
      loadReports();
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    }

    // ── Products ──────────────────────────────────────────────

    let variantCount = 0;
    function addVariantRow(v) {
      const idx = variantCount++;
      const row = document.createElement('div');
      row.id = `vrow-${idx}`;
      row.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:0.5rem;margin-bottom:0.4rem;align-items:center;';
      row.innerHTML = `
        <input type="text" placeholder="Label (e.g. S / Black)" class="finput" id="v-label-${idx}" value="${v?.label||''}">
        <input type="number" placeholder="Price" class="finput" id="v-price-${idx}" step="0.01" min="0" value="${v?.price||''}">
        <input type="text" placeholder="Printful Variant ID" class="finput" id="v-pf-${idx}" value="${v?.printfulVariantId||''}">
        <input type="text" placeholder="Lulu Product ID" class="finput" id="v-lu-${idx}" value="${v?.luluProductId||''}">
        <button type="button" onclick="document.getElementById('vrow-${idx}').remove()" style="background:#fdeaea;color:#e00;border:none;border-radius:6px;padding:0.3rem 0.5rem;cursor:pointer;">✕</button>`;
      document.getElementById('variant-rows').appendChild(row);
    }

    function autoSlug() {
      const name = document.getElementById('prod-name').value;
      document.getElementById('prod-slug').value = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    }

    function collectVariants() {
      const variants = [];
      document.querySelectorAll('[id^="v-label-"]').forEach(el => {
        const idx = el.id.replace('v-label-', '');
        const label = el.value.trim();
        const price = parseFloat(document.getElementById(`v-price-${idx}`)?.value) || 0;
        if (!label) return;
        variants.push({
          label,
          price,
          printfulVariantId: parseInt(document.getElementById(`v-pf-${idx}`)?.value) || null,
          luluProductId:     document.getElementById(`v-lu-${idx}`)?.value.trim() || '',
        });
      });
      return variants;
    }

    document.getElementById('product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('product-form-msg');
      const res = await fetch('/api/admin/products', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:      document.getElementById('prod-name').value,
          slug:      document.getElementById('prod-slug').value,
          description: document.getElementById('prod-desc').value,
          imageUrl:  document.getElementById('prod-image').value,
          fulfiller: document.getElementById('prod-fulfiller').value,
          variants:  collectVariants(),
        }),
      });
      const data = await res.json();
      if (res.ok) {
        msgEl.style.cssText = 'display:block;background:#e8f5e2;color:#2d6a2d;border-radius:8px;padding:0.6rem 1rem;margin-bottom:0.8rem;font-size:0.85rem;';
        msgEl.textContent = 'Product added!';
        e.target.reset();
        document.getElementById('variant-rows').innerHTML = '';
        variantCount = 0;
        loadAdminProducts();
      } else {
        msgEl.style.cssText = 'display:block;background:#fdeaea;color:#c00;border-radius:8px;padding:0.6rem 1rem;margin-bottom:0.8rem;font-size:0.85rem;';
        msgEl.textContent = data.error || 'Failed to add product.';
      }
    });

    async function loadAdminProducts() {
      const res  = await fetch('/api/admin/products');
      const data = await res.json();
      const el   = document.getElementById('products-table');
      if (!data.products || !data.products.length) {
        el.innerHTML = '<p style="color:#aaa;">No products yet. Add one above.</p>'; return;
      }
      const fulfillerLabel = { printful: 'Printful', lulu: 'Lulu', manual: 'Manual' };
      el.innerHTML = `<table class="admin-table">
        <thead><tr><th>Name</th><th>Fulfiller</th><th>Variants</th><th>Active</th><th>Actions</th></tr></thead>
        <tbody>${data.products.map(p => `<tr>
          <td><strong>${p.name}</strong><br><span style="color:#aaa;font-size:0.78rem;">${p.slug}</span></td>
          <td>${fulfillerLabel[p.fulfiller]||p.fulfiller}</td>
          <td>${p.variants.map(v => `<span style="display:inline-block;margin:1px 3px;background:#f5f0eb;border-radius:4px;padding:1px 6px;font-size:0.78rem;">${v.label} – $${v.price.toFixed(2)}</span>`).join('')}</td>
          <td><span style="color:${p.active?'#1e7a40':'#aaa'};font-weight:600;font-size:0.82rem;">${p.active?'Active':'Inactive'}</span></td>
          <td>
            <button onclick="toggleProduct('${p._id}',${!p.active})" style="background:#f5f0eb;color:#6b5b47;border:none;border-radius:6px;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.8rem;font-weight:600;margin-right:4px;">${p.active?'Deactivate':'Activate'}</button>
            <button onclick="deleteProduct('${p._id}')" style="background:#fdeaea;color:#e00;border:none;border-radius:6px;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.8rem;font-weight:600;">Delete</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    async function toggleProduct(id, active) {
      await fetch(`/api/admin/products/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ active }) });
      loadAdminProducts();
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      await fetch(`/api/admin/products/${id}`, { method:'DELETE' });
      loadAdminProducts();
    }

    // ── Shop Orders ──────────────────────────────────────────

    async function loadAdminOrders() {
      const pay     = document.getElementById('order-filter-pay').value;
      const fulfill = document.getElementById('order-filter-fulfill').value;
      let url = '/api/admin/orders?';
      if (pay)     url += `status=${pay}&`;
      if (fulfill) url += `fulfillment=${fulfill}`;
      const res  = await fetch(url);
      const data = await res.json();
      const el   = document.getElementById('orders-table');
      if (!data.orders || !data.orders.length) {
        el.innerHTML = '<p style="color:#aaa;">No orders found.</p>'; return;
      }
      const payColors     = { paid:'#1e7a40', pending:'#b45c00', refunded:'#888', failed:'#e00' };
      const fulfillColors = { unfulfilled:'#b45c00', partial:'#2a5db0', fulfilled:'#1e7a40', error:'#e00' };
      el.innerHTML = `<table class="admin-table">
        <thead><tr><th>Order #</th><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Fulfillment</th><th>Tracking</th><th>Actions</th></tr></thead>
        <tbody>${data.orders.map(o => `<tr>
          <td style="font-size:0.8rem;font-family:monospace;">${o.lookupToken.slice(0,8).toUpperCase()}</td>
          <td style="font-size:0.82rem;">${new Date(o.createdAt).toLocaleDateString()}</td>
          <td><strong style="font-size:0.88rem;">${o.firstName} ${o.lastName}</strong><br><span style="color:#aaa;font-size:0.78rem;">${o.email}</span></td>
          <td style="font-size:0.82rem;">${o.items.map(i=>`${i.productName}${i.variantLabel?' – '+i.variantLabel:''} ×${i.quantity}`).join('<br>')}</td>
          <td style="font-weight:700;">$${o.total.toFixed(2)}</td>
          <td><span style="color:${payColors[o.paymentStatus]||'#888'};font-weight:600;font-size:0.82rem;">${o.paymentStatus}</span></td>
          <td><span style="color:${fulfillColors[o.fulfillmentStatus]||'#888'};font-weight:600;font-size:0.82rem;">${o.fulfillmentStatus}</span></td>
          <td style="font-size:0.8rem;">${o.trackingNumber ? `<a href="${o.trackingUrl||'#'}" target="_blank" style="color:#2a5db0;">${o.trackingNumber}</a>` : '—'}</td>
          <td>
            <button onclick="openOrderEdit('${o._id}','${(o.trackingNumber||'').replace(/'/g,"\\'")}','${(o.trackingUrl||'').replace(/'/g,"\\'")}','${(o.carrier||'').replace(/'/g,"\\'")}')" style="background:#e8f0fb;color:#2a5db0;border:none;border-radius:6px;padding:0.3rem 0.5rem;cursor:pointer;font-size:0.78rem;font-weight:600;margin-right:3px;">Edit</button>
            ${o.paymentStatus === 'paid' ? `<button onclick="refundOrder('${o._id}')" style="background:#fdeaea;color:#e00;border:none;border-radius:6px;padding:0.3rem 0.5rem;cursor:pointer;font-size:0.78rem;font-weight:600;">Refund</button>` : ''}
          </td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    let editingOrderId = null;
    function openOrderEdit(id, tracking, trackingUrl, carrier) {
      editingOrderId = id;
      document.getElementById('oedit-tracking').value    = tracking;
      document.getElementById('oedit-trackingUrl').value = trackingUrl;
      document.getElementById('oedit-carrier').value     = carrier;
      document.getElementById('order-edit-msg').style.display = 'none';
      document.getElementById('order-edit-modal').style.display = 'flex';
    }
    function closeOrderEdit() {
      document.getElementById('order-edit-modal').style.display = 'none';
      editingOrderId = null;
    }
    async function saveOrderEdit() {
      const msgEl = document.getElementById('order-edit-msg');
      const res = await fetch(`/api/admin/orders/${editingOrderId}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          trackingNumber: document.getElementById('oedit-tracking').value,
          trackingUrl:    document.getElementById('oedit-trackingUrl').value,
          carrier:        document.getElementById('oedit-carrier').value,
          fulfillmentStatus: document.getElementById('oedit-status').value || undefined,
        }),
      });
      const data = await res.json();
      if (res.ok) { closeOrderEdit(); loadAdminOrders(); }
      else {
        msgEl.style.cssText = 'display:block;background:#fdeaea;color:#c00;border-radius:6px;padding:0.5rem;font-size:0.85rem;margin-bottom:0.5rem;';
        msgEl.textContent = data.error || 'Failed to update.';
      }
    }
    async function refundOrder(id) {
      if (!confirm('Issue a full refund for this order?')) return;
      const res = await fetch(`/api/admin/orders/${id}/refund`, { method:'POST' });
      const data = await res.json();
      if (res.ok) { loadAdminOrders(); }
      else { alert(data.error || 'Refund failed.'); }
    }

    init();
  </script>

  <style>
    .tab-btn {
      background: none; border: none; padding: 0.75rem 1.3rem; font-size: 0.95rem;
      font-weight: 600; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: color 0.2s, border-color 0.2s; white-space: nowrap;
    }
    .tab-btn.active { color: #e8a87c; border-bottom-color: #e8a87c; }
    .tab-btn:hover { color: #6b5b47; }

    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 600px; }
    .admin-table th { text-align: left; padding: 0.6rem 0.8rem; background: #f7f5f2; color: #888; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #eee; }
    .admin-table td { padding: 0.75rem 0.8rem; border-bottom: 1px solid #f0ede8; vertical-align: top; }
    .admin-table tr:hover td { background: #fdfcfa; }

    .stat-card { border-radius: 8px; background: #fff; padding: 1rem 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

    .flabel { display: block; font-weight: 600; color: #6b5b47; margin-bottom: 0.3rem; font-size: 0.85rem; }
    .finput { width: 100%; padding: 0.65rem 0.8rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.9rem; background: #fff; box-sizing: border-box; }

    @media (max-width: 768px) {
      .logo-img { display: none !important; }
      .logo-text { display: inline-block !important; }
      nav.container { display: flex; align-items: center; padding: 0 1rem; min-height: 56px; }
      body { padding-top: 0; }
    }
  </style>
</body>
</html>

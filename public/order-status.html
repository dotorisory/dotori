<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Status – Dotori School</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="assets/images/logo.png">
</head>
<body>
  <header>
    <nav class="container">
      <div class="logo">
        <a href="/"><img src="assets/images/logo.png" alt="Dotori School" style="max-width:80px;" class="logo-img">
          <span class="logo-text" style="display:none;font-size:1.5rem;font-weight:700;color:#6b5b47;">Dotori School</span>
        </a>
      </div>
      <ul class="nav-links" style="display:flex;">
        <li><a href="/">Home</a></li>
        <li><a href="/shop">Shop</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="container" style="padding:2rem 1rem 5rem; max-width:640px; margin:0 auto;">

      <div id="loading" style="color:#aaa; text-align:center; padding:3rem;">Loading order status…</div>

      <div id="order-view" style="display:none;">
        <h1 style="color:#6b5b47; font-size:1.5rem; margin-bottom:0.3rem;">Order Status</h1>
        <p id="order-id-line" style="color:#aaa; font-size:0.88rem; margin-bottom:1.5rem;"></p>

        <!-- Status badge -->
        <div id="status-bar" style="background:#fff; border:1px solid #e8e0d8; border-radius:14px; padding:1.2rem 1.5rem; margin-bottom:1.2rem; display:flex; align-items:center; gap:1rem;">
          <div id="status-icon" style="font-size:2rem;"></div>
          <div>
            <div id="status-label" style="font-weight:700; color:#6b5b47; font-size:1.05rem;"></div>
            <div id="status-sub" style="color:#aaa; font-size:0.85rem;"></div>
          </div>
        </div>

        <!-- Tracking -->
        <div id="tracking-box" style="display:none; background:#f0f7ef; border:1px solid #c8e0c4; border-radius:14px; padding:1.2rem 1.5rem; margin-bottom:1.2rem;">
          <div style="font-weight:700; color:#2d6a2d; margin-bottom:0.4rem;">📦 Shipment Tracking</div>
          <div id="tracking-info" style="color:#444; font-size:0.9rem; line-height:1.7;"></div>
        </div>

        <!-- Items -->
        <div style="background:#fff; border:1px solid #e8e0d8; border-radius:14px; padding:1.2rem 1.5rem; margin-bottom:1.2rem;">
          <div style="font-weight:700; color:#6b5b47; margin-bottom:0.8rem;">Items Ordered</div>
          <div id="order-items"></div>
          <div style="border-top:1px solid #eee; margin-top:0.6rem; padding-top:0.8rem;">
            <div style="display:flex; justify-content:space-between; color:#888; font-size:0.88rem; margin-bottom:0.3rem;"><span>Subtotal</span><span id="os-subtotal"></span></div>
            <div style="display:flex; justify-content:space-between; color:#888; font-size:0.88rem; margin-bottom:0.3rem;"><span>Shipping</span><span id="os-shipping"></span></div>
            <div style="display:flex; justify-content:space-between; color:#888; font-size:0.88rem; margin-bottom:0.4rem;"><span>Tax</span><span id="os-tax"></span></div>
            <div style="display:flex; justify-content:space-between; font-weight:700; color:#6b5b47; font-size:1rem;"><span>Total</span><span id="os-total"></span></div>
          </div>
        </div>

        <!-- Shipping address -->
        <div style="background:#fff; border:1px solid #e8e0d8; border-radius:14px; padding:1.2rem 1.5rem; margin-bottom:1.5rem;">
          <div style="font-weight:700; color:#6b5b47; margin-bottom:0.5rem;">Shipping Address</div>
          <div id="os-address" style="color:#666; font-size:0.9rem; line-height:1.6;"></div>
        </div>

        <a href="/shop" style="display:inline-block; color:#6b5b47; font-size:0.9rem; text-decoration:none;">← Continue Shopping</a>
      </div>

      <div id="error-msg" style="display:none; text-align:center; padding:3rem; color:#aaa;">
        <p>Order not found. Please check your confirmation email for the correct link.</p>
        <a href="/shop" style="color:#6b5b47;">← Back to Shop</a>
      </div>

    </div>
  </main>

  <script>
    const statusConfig = {
      pending:     { icon: '⏳', label: 'Payment Pending',  sub: 'Waiting for payment confirmation.' },
      paid:        { icon: '✅', label: 'Order Confirmed',   sub: 'Your order is being prepared for shipment.' },
      partial:     { icon: '⚙️', label: 'In Production',     sub: 'Your order is being printed and prepared.' },
      unfulfilled: { icon: '📋', label: 'Processing',        sub: 'Your order is queued for fulfillment.' },
      fulfilled:   { icon: '📦', label: 'Shipped',           sub: 'Your order is on its way!' },
      error:       { icon: '⚠️', label: 'Fulfillment Issue', sub: 'We\'re looking into this. Please contact us.' },
      refunded:    { icon: '💳', label: 'Refunded',          sub: 'Your payment has been refunded.' },
    };

    let refreshInterval = null;

    async function loadOrder() {
      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) {
        document.getElementById('loading').style.display   = 'none';
        document.getElementById('error-msg').style.display = 'block';
        return;
      }

      try {
        const res  = await fetch(`/api/shop/order-status/${token}`);
        const data = await res.json();
        if (!res.ok || !data.order) throw new Error('Not found');

        const o = data.order;
        document.getElementById('loading').style.display    = 'none';
        document.getElementById('order-view').style.display = 'block';

        document.getElementById('order-id-line').textContent =
          `Order #${token.slice(0, 8).toUpperCase()} · Placed ${new Date(o.createdAt).toLocaleDateString()}`;

        // Status
        const st     = o.fulfillmentStatus === 'fulfilled' ? 'fulfilled'
                     : o.paymentStatus     === 'refunded'  ? 'refunded'
                     : o.fulfillmentStatus === 'error'     ? 'error'
                     : o.paymentStatus     === 'paid'      ? (o.fulfillmentStatus === 'unfulfilled' ? 'paid' : 'partial')
                     : 'pending';
        const config = statusConfig[st] || statusConfig.pending;
        document.getElementById('status-icon').textContent  = config.icon;
        document.getElementById('status-label').textContent = config.label;
        document.getElementById('status-sub').textContent   = config.sub;

        // Tracking
        if (o.trackingNumber) {
          document.getElementById('tracking-box').style.display = 'block';
          document.getElementById('tracking-info').innerHTML =
            `<strong>Carrier:</strong> ${o.carrier || 'Carrier'}<br>
             <strong>Tracking #:</strong> ${o.trackingNumber}<br>
             ${o.trackingUrl ? `<a href="${o.trackingUrl}" target="_blank" rel="noopener" style="color:#2d6a2d;font-weight:600;">Track Package →</a>` : ''}
             ${o.shippedAt ? `<br><strong>Shipped:</strong> ${new Date(o.shippedAt).toLocaleDateString()}` : ''}`;
        }

        // Items
        document.getElementById('order-items').innerHTML = o.items.map(i =>
          `<div style="display:flex; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid #f5f0eb; font-size:0.9rem;">
             <span style="color:#444;">${i.productName}${i.variantLabel ? ' – ' + i.variantLabel : ''} × ${i.quantity}</span>
             <span style="font-weight:600; color:#6b5b47;">$${(i.unitPrice * i.quantity).toFixed(2)}</span>
           </div>`
        ).join('');

        document.getElementById('os-subtotal').textContent = `$${o.subtotal.toFixed(2)}`;
        document.getElementById('os-shipping').textContent = o.shippingCost === 0 ? 'Free' : `$${o.shippingCost.toFixed(2)}`;
        document.getElementById('os-tax').textContent      = `$${(o.taxAmount || 0).toFixed(2)}`;
        document.getElementById('os-total').textContent    = `$${o.total.toFixed(2)}`;

        const a = o.address;
        document.getElementById('os-address').innerHTML =
          `${o.firstName} ${o.lastName}<br>
           ${a.line1}${a.line2 ? ', ' + a.line2 : ''}<br>
           ${a.city}, ${a.state} ${a.zip}`;

        // Auto-refresh if not yet shipped
        if (o.fulfillmentStatus !== 'fulfilled' && o.paymentStatus !== 'refunded') {
          if (!refreshInterval) {
            refreshInterval = setInterval(loadOrder, 60000);
          }
        } else {
          clearInterval(refreshInterval);
        }

      } catch (err) {
        document.getElementById('loading').style.display   = 'none';
        document.getElementById('error-msg').style.display = 'block';
      }
    }

    loadOrder();
  </script>
</body>
</html>

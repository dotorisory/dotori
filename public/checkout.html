<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout – Dotori School</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="assets/images/logo.png">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    .checkout-layout { display:grid; grid-template-columns:1fr 380px; gap:2rem; align-items:start; }
    @media(max-width:780px){ .checkout-layout{grid-template-columns:1fr;} .order-summary{order:-1;} }
    .section-box { background:#fff; border:1px solid #e8e0d8; border-radius:14px; padding:1.5rem; margin-bottom:1.2rem; }
    .section-title { font-weight:700; color:#6b5b47; font-size:1rem; margin:0 0 1rem; }
    .finput { width:100%; padding:0.65rem 0.9rem; border:1.5px solid #ddd; border-radius:8px; font-size:0.95rem; box-sizing:border-box; }
    .finput:focus { outline:none; border-color:#6b5b47; }
    .flabel { display:block; font-weight:600; color:#6b5b47; margin-bottom:0.3rem; font-size:0.88rem; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; }
    .order-item { display:flex; gap:0.8rem; align-items:flex-start; padding:0.7rem 0; border-bottom:1px solid #f5f0eb; }
    .order-item img { width:52px; height:52px; object-fit:cover; border-radius:8px; background:#f5f0eb; flex-shrink:0; }
    .order-item .no-img-sm { width:52px; height:52px; border-radius:8px; background:#f5f0eb; display:flex; align-items:center; justify-content:center; color:#bbb; font-size:1.3rem; flex-shrink:0; }
    .total-row { display:flex; justify-content:space-between; padding:0.45rem 0; font-size:0.9rem; color:#666; }
    .total-row.grand { font-weight:700; color:#6b5b47; font-size:1rem; border-top:1px solid #eee; margin-top:0.3rem; padding-top:0.7rem; }
    #payment-element { margin-top:0.5rem; }
    #card-errors { color:#e00; font-size:0.85rem; margin-top:0.5rem; min-height:1.2em; }
    #pay-btn { width:100%; padding:0.85rem; background:#6b5b47; color:#fff; border:none; border-radius:10px; font-weight:700; font-size:1rem; cursor:pointer; margin-top:1rem; }
    #pay-btn:disabled { background:#bbb; cursor:not-allowed; }
  </style>
</head>
<body>
  <header>
    <nav class="container">
      <div class="logo">
        <a href="/"><img src="assets/images/logo.png" alt="Dotori School" style="max-width:80px;" class="logo-img">
          <span class="logo-text" style="display:none;font-size:1.5rem;font-weight:700;color:#6b5b47;">Dotori School</span>
        </a>
      </div>
      <ul class="nav-links" style="display:flex;">
        <li><a href="/">Home</a></li>
        <li><a href="/programs">Programs</a></li>
        <li><a href="/shop">Shop</a></li>
        <!-- <li id="nav-account-link"><a href="/login">My Account</a></li> -->
      </ul>
    </nav>
  </header>

  <main>
    <div class="container" style="padding:2rem 1rem 4rem;">
      <h1 style="color:#6b5b47;font-size:1.6rem;margin-bottom:1.5rem;">Checkout</h1>

      <div id="empty-cart-msg" style="display:none;text-align:center;padding:3rem;">
        <p style="color:#aaa;font-size:1.1rem;">Your cart is empty.</p>
        <a href="/shop" style="color:#6b5b47;font-weight:700;">← Back to Shop</a>
      </div>

      <div id="checkout-body" class="checkout-layout">

        <!-- Left: forms -->
        <div>
          <!-- Contact info -->
          <div class="section-box">
            <p class="section-title">Contact Information</p>
            <div class="form-row" style="margin-bottom:0.8rem;">
              <div><label class="flabel">First Name *</label><input type="text" id="firstName" class="finput" autocomplete="given-name"></div>
              <div><label class="flabel">Last Name *</label><input type="text" id="lastName" class="finput" autocomplete="family-name"></div>
            </div>
            <div style="margin-bottom:0.8rem;"><label class="flabel">Email *</label><input type="email" id="email" class="finput" autocomplete="email"></div>
            <div><label class="flabel">Phone (optional)</label><input type="tel" id="phone" class="finput" autocomplete="tel"></div>
          </div>

          <!-- Shipping address -->
          <div class="section-box">
            <p class="section-title">Shipping Address</p>
            <div style="margin-bottom:0.8rem;"><label class="flabel">Address Line 1 *</label><input type="text" id="addr-line1" class="finput" autocomplete="address-line1"></div>
            <div style="margin-bottom:0.8rem;"><label class="flabel">Address Line 2</label><input type="text" id="addr-line2" class="finput" autocomplete="address-line2"></div>
            <div class="form-row" style="margin-bottom:0.8rem;">
              <div><label class="flabel">City *</label><input type="text" id="addr-city" class="finput" autocomplete="address-level2"></div>
              <div><label class="flabel">State *</label><input type="text" id="addr-state" class="finput" maxlength="2" placeholder="WA" autocomplete="address-level1" style="text-transform:uppercase;"></div>
            </div>
            <div class="form-row">
              <div><label class="flabel">ZIP Code *</label><input type="text" id="addr-zip" class="finput" autocomplete="postal-code"></div>
              <div><label class="flabel">Country</label><input type="text" id="addr-country" class="finput" value="US" maxlength="2" style="text-transform:uppercase;"></div>
            </div>
          </div>

          <!-- Payment -->
          <div class="section-box">
            <p class="section-title">Payment</p>
            <div id="payment-element"></div>
            <div id="card-errors"></div>
            <button id="pay-btn" disabled>Place Order</button>
          </div>
        </div>

        <!-- Right: order summary -->
        <div class="order-summary">
          <div class="section-box">
            <p class="section-title">Order Summary</p>
            <div id="order-items"></div>
            <div style="margin-top:0.8rem;">
              <div class="total-row"><span>Subtotal</span><span id="sum-subtotal">$0.00</span></div>
              <div class="total-row"><span>Shipping</span><span id="sum-shipping">—</span></div>
              <div class="total-row"><span>Tax <span id="tax-status" style="font-size:0.75rem;color:#aaa;">(enter address)</span></span><span id="sum-tax">—</span></div>
              <div class="total-row grand"><span>Total</span><span id="sum-total">—</span></div>
            </div>
          </div>
          <a href="/shop" style="display:block;text-align:center;color:#6b5b47;font-size:0.88rem;text-decoration:none;">← Edit cart</a>
        </div>

      </div>
    </div>
  </main>

  <script>
    let stripe, elements, paymentElement;
    let cart = JSON.parse(sessionStorage.getItem('dotori_cart') || '[]');
    let currentCalculationId = null;
    let currentTaxAmount = 0;
    let taxDebounceTimer = null;

    // Nav account link
    fetch('/api/auth/me').then(r => r.json()).then(d => {
      if (d.user) document.getElementById('nav-account-link').innerHTML = `<a href="/profile">My Account</a>`;
    }).catch(() => {});

    async function init() {
      if (!cart.length) {
        document.getElementById('empty-cart-msg').style.display = 'block';
        document.getElementById('checkout-body').style.display = 'none';
        return;
      }

      renderOrderSummary();
      await setupStripe();
      setupAddressListeners();
    }

    function getSubtotal() {
      return cart.reduce((s, i) => s + i.price * i.qty, 0);
    }

    function getShipping(subtotal) {
      const threshold = parseFloat('50');
      return subtotal >= threshold ? 0 : 5.99;
    }

    function renderOrderSummary() {
      const subtotal  = getSubtotal();
      const shipping  = getShipping(subtotal);

      document.getElementById('order-items').innerHTML = cart.map(item =>
        `<div class="order-item">
          ${item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.productName}">` : `<div class="no-img-sm">📦</div>`}
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;color:#6b5b47;font-size:0.88rem;">${item.productName}</div>
            ${item.variantLabel ? `<div style="color:#aaa;font-size:0.78rem;">${item.variantLabel}</div>` : ''}
            <div style="font-size:0.85rem;color:#666;">Qty: ${item.qty}</div>
          </div>
          <div style="font-weight:700;color:#6b5b47;font-size:0.9rem;white-space:nowrap;">$${(item.price * item.qty).toFixed(2)}</div>
        </div>`
      ).join('');

      document.getElementById('sum-subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('sum-shipping').textContent = shipping === 0 ? 'Free' : `$${shipping.toFixed(2)}`;
      updateTotal();
    }

    function updateTotal() {
      const subtotal = getSubtotal();
      const shipping = getShipping(subtotal);
      const tax      = currentTaxAmount;
      const total    = subtotal + shipping + tax;
      document.getElementById('sum-tax').textContent   = tax > 0 ? `$${tax.toFixed(2)}` : '$0.00';
      document.getElementById('sum-total').textContent = `$${total.toFixed(2)}`;
    }

    async function setupStripe() {
      try {
        const keyRes = await fetch('/api/auth/stripe-key');
        const { publishableKey } = await keyRes.json();
        stripe = Stripe(publishableKey);

        const subtotal = getSubtotal();
        const shipping = getShipping(subtotal);
        const totalCents = Math.round((subtotal + shipping) * 100); // tax added later

        elements = stripe.elements({
          mode:     'payment',
          amount:   totalCents,
          currency: 'usd',
          appearance: { theme: 'stripe', variables: { colorPrimary: '#6b5b47' } },
        });

        paymentElement = elements.create('payment');
        paymentElement.mount('#payment-element');
        paymentElement.on('ready', () => {
          document.getElementById('pay-btn').disabled = false;
        });
      } catch (err) {
        document.getElementById('card-errors').textContent = 'Payment system unavailable. Please try again.';
      }
    }

    function getAddress() {
      return {
        line1:   document.getElementById('addr-line1').value.trim(),
        line2:   document.getElementById('addr-line2').value.trim(),
        city:    document.getElementById('addr-city').value.trim(),
        state:   document.getElementById('addr-state').value.trim().toUpperCase(),
        zip:     document.getElementById('addr-zip').value.trim(),
        country: document.getElementById('addr-country').value.trim().toUpperCase() || 'US',
      };
    }

    function addressComplete() {
      const a = getAddress();
      return a.line1 && a.city && a.state && a.zip;
    }

    function setupAddressListeners() {
      ['addr-zip', 'addr-state', 'addr-city', 'addr-line1'].forEach(id => {
        document.getElementById(id).addEventListener('blur', () => {
          clearTimeout(taxDebounceTimer);
          taxDebounceTimer = setTimeout(estimateTax, 600);
        });
      });
    }

    async function estimateTax() {
      if (!addressComplete()) return;
      document.getElementById('tax-status').textContent = '(calculating…)';
      try {
        const subtotal  = getSubtotal();
        const shipping  = getShipping(subtotal);
        const address   = getAddress();
        const res = await fetch('/api/shop/tax-estimate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: cart, address, shippingCost: shipping }),
        });
        const data = await res.json();
        currentTaxAmount     = data.taxAmount || 0;
        currentCalculationId = data.calculationId || null;
        document.getElementById('tax-status').textContent = '';
        updateTotal();
      } catch (err) {
        document.getElementById('tax-status').textContent = '(unavailable)';
        currentTaxAmount = 0;
        updateTotal();
      }
    }

    document.getElementById('pay-btn').addEventListener('click', async () => {
      const errEl = document.getElementById('card-errors');
      errEl.textContent = '';

      // Validate form
      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      const email     = document.getElementById('email').value.trim();
      const address   = getAddress();

      if (!firstName || !lastName || !email) {
        errEl.textContent = 'Please fill in your name and email.'; return;
      }
      if (!address.line1 || !address.city || !address.state || !address.zip) {
        errEl.textContent = 'Please complete your shipping address.'; return;
      }

      const btn = document.getElementById('pay-btn');
      btn.disabled   = true;
      btn.textContent = 'Processing…';

      try {
        // Create order + payment intent
        const res = await fetch('/api/shop/create-payment-intent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            items: cart,
            guest: {
              email, firstName, lastName,
              phone:   document.getElementById('phone').value.trim(),
              address,
            },
            calculationId: currentCalculationId,
            taxAmount:     currentTaxAmount,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to create order.');

        // Confirm payment (Stripe redirects to order-confirmation)
        const { error } = await stripe.confirmPayment({
          elements,
          clientSecret: data.clientSecret,
          confirmParams: {
            return_url: `${window.location.origin}/order-confirmation`,
          },
        });

        if (error) throw new Error(error.message);
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled   = false;
        btn.textContent = 'Place Order';
      }
    });

    init();
  </script>
</body>
</html>
